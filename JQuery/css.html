<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove</title>
</head>
<body>
    <h1>Usuwanie zawartości</h1>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(function($){
            $("p").click(function(){
                $(this).css("background-color", "yellow")              
            })
        })
    </script>
    <p style="background-color: #ff0000">This is a paragraph in the div</p>
    <p style="background-color: #00ff00">This is a paragraph in the div</p>
    <p style="background-color: #0000ff">This is a paragraph in the div</p>
</body>
</html>
