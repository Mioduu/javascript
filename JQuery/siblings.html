<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent</title>
</head>
<body class="siblings">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> 
    <script>
        $(function($){
            $("h2").siblings().css({"color": "red",
                                    "border": "2px solid red"})
        })
    </script>
    <style>
        .siblings {
            display: block;
            border: 2px solid lightgrey;
            color: lightgrey;
            padding: 5px;
            margin: 15px;
        }
    </style>
    <div>div (parent)
        <p>p</p>
        <span>span</span>
        <h2>h2</h2>
        <h3>h3</h3>
        <p>p</p>
    </div>
</body>
</html>
