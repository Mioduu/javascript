<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove</title>
</head>
<body>
    <h1>Dodawanie i usuwanie klas</h1>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(function($){
            $("button").click(function(){
                $("p").toggleClass("red")
            })
        })
    </script>
    <style>
        .red{ color: red }
    </style>
    <p>This is a paragraph</p>
    <button>Add/Remove class to p element</button>
</body>
</html>
