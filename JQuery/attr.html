<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute</title>
</head>
<body>
    <h1>Odczyt zawartości atrybutu funkcją attr</h1>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(function($){
            $("button").click(function(){
                alert($("#link").attr("href", "https://www.youtube.com/watch?v=dXji8ycMolI"))
            })
        })
    </script>
    <a href="https://w3schools.com" id="link">w3schools.com</a>
    <button>Show "href" Value</button>
</body>
</html>
