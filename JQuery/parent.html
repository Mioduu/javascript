<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent</title>
</head>
<body>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(function($){
            $("span").parent().css({"color": "red",
                "border": "2px solid red"
            })
        })
    </script>
    <style>
        .ancestors * {
            display: block;
            border: 2px solid lightgrey;
            color: lightgrey;
            padding: 5px;
            margin: 15px;
        }
    </style>

    <div class="ancestors">
        <div style="width:300px">div (grandparent)
            <p>p (direct parent)</p>
            <span>span</span>
        </div>
    </div>
</body>
</html>
