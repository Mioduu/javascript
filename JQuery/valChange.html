<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label</title>
</head>
<body>
    <h1>Zmiana zawartości pola tekstowego</h1>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(function($) {
            $("button").click(function(){
                alert($("#name").val("Zorro"))
            })
        })
    </script>
    <label>Imie
        <input type="text" id="name" value="Mickey Mouse">
    </label>
    <button>Change content</button>
</body>
</html>
