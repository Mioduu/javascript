<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML</title>
</head>
<body>
    <h1>Odczytywanie tekstu ze znacznika</h1>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(function($){
            $("button").click(function() {
                alert($("#test").text())
            })
        })
    </script>
    <p id="test">This is some <b>bold</b> text in the paragraph</p>
    <button>Show text</button>
</body>
</html>
